services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app              # live source — changes trigger HMR
      - frontend_nm:/app/node_modules  # isolate container's node_modules
    environment:
      VITE_PROXY_TARGET: "http://manager:8000"
      HMR_HOST: "localhost"
      HMR_PORT: "3000"
    depends_on:
      manager:
        condition: service_healthy

volumes:
  frontend_nm:
